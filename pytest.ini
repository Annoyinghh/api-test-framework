[pytest]
# Pytest 配置文件

# 测试目录
testpaths = tests

# 测试文件命名规则
python_files = test_*.py

# 测试类命名规则
python_classes = Test*

# 测试函数命名规则
python_functions = test_*

# 命令行参数
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=./reports/allure-results
    --clean-alluredir

# 标记
markers =
    smoke: 冒烟测试
    regression: 回归测试
    user: 用户模块测试
    order: 订单模块测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 最小 Python 版本
minversion = 7.0
